*{box-sizing:border-box}
body{margin:0;height:100vh;background:#0d1117;font-family:'JetBrains Mono',monospace;color:#c9d1d9;overflow:hidden}

/* =========================
   CINEMATIC BOOT EFFECTS
   ========================= */

.boot-screen{
position:fixed;
inset:0;
background:#000;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:20px;
z-index:9999;
overflow:hidden;
animation:crtGlow 3s ease-in-out infinite alternate;
}

.boot-screen.hidden{display:none}

.boot-logo{
width:140px;
height:140px;
object-fit:contain;
animation:logoPulse 2.4s ease-in-out infinite;
}

.boot-text{opacity:.7;color:#8b949e;font-size:14px}

.boot-flicker{
position:absolute;
inset:0;
background:#fff;
opacity:0;
pointer-events:none;
mix-blend-mode:overlay;
}

.scanlines{
position:absolute;
inset:0;
pointer-events:none;
background:repeating-linear-gradient(
transparent 0px,
transparent 2px,
rgba(255,255,255,0.03) 3px,
transparent 4px
);
animation:scanMove 6s linear infinite;
}

@keyframes crtGlow{
0%{filter:brightness(1) contrast(1)}
100%{filter:brightness(1.05) contrast(1.1)}
}

@keyframes logoPulse{
0%,100%{transform:scale(1);filter:drop-shadow(0 0 0px rgba(255,255,255,.2))}
50%{transform:scale(1.05);filter:drop-shadow(0 0 12px rgba(255,255,255,.25))}
}

@keyframes scanMove{
0%{transform:translateY(0)}
100%{transform:translateY(100%)}
}

/* ===== MENU BAR ===== */
.menu-bar{position:absolute;top:0;left:0;right:0;height:28px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;padding:0 12px;font-size:12px}
.menu-right{margin-left:auto;opacity:.7}

/* ===== DESKTOP ===== */
.desktop{position:absolute;inset:28px 0 0 0;padding:18px;display:grid;grid-template-columns:repeat(auto-fill,90px);gap:18px}
.icon{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:default}
.icon .symbol{font-size:34px}
.icon .label{font-size:12px;color:#8b949e}

/* ===== WINDOW ===== */
.window{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:900px;height:520px;background:#010409;border-radius:10px;box-shadow:0 0 0 1px #30363d,0 20px 60px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden}
.window.hidden{display:none}
.window-header{height:38px;background:#161b22;border-bottom:1px solid #30363d;display:flex;align-items:center;padding:0 14px;cursor:grab}
.window-title{margin-left:12px;font-size:13px;color:#c9d1d9;opacity:.75;pointer-events:none}

.dot{width:12px;height:12px;border-radius:50%;background:#ff5f56;cursor:pointer}
.window-body{flex:1;overflow:auto;padding:22px;line-height:1.6;font-size:14px;font-family:'JetBrains Mono',monospace}
.editor-area{width:100%;height:100%;background:#010409;color:#c9d1d9;border:none;outline:none;font-family:'JetBrains Mono',monospace;font-size:14px;resize:none;padding:22px}

.line{display:flex;gap:8px;white-space:nowrap}
.prompt{color:#58a6ff}
.output{color:#8b949e;margin-left:18px}
input{background:transparent;border:none;outline:none;color:#c9d1d9;font-family:inherit;font-size:14px;width:100%}
.glitch{animation:glitch 120ms infinite}
@keyframes glitch{0%{transform:translate(0,0)}20%{transform:translate(-1px,1px)}40%{transform:translate(1px,-1px)}60%{transform:translate(-1px,0)}80%{transform:translate(1px,1px)}100%{transform:translate(0,0)}}
.fade{opacity:.35}

.artifact-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.85);opacity:0;pointer-events:none;transition:.4s}
.artifact-overlay.visible{opacity:1}
.artifact-overlay img{max-width:80%;max-height:80%;image-rendering:pixelated;box-shadow:0 0 40px rgba(0,255,200,.25)}

.file-grid{display:grid;grid-template-columns:repeat(auto-fill,90px);gap:16px}
.file-item{display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:6px;border-radius:6px}
.file-item:hover{background:rgba(255,255,255,0.05)}
.file-item span{font-size:12px;color:#8b949e;text-align:center;word-break:break-word}
.path-bar{font-size:12px;margin-bottom:10px;color:#8b949e}
button.nav{margin-bottom:12px;background:#161b22;border:none;color:#c9d1d9;padding:6px 10px;border-radius:6px;cursor:pointer}

/* ===== VIM OVERLAY ===== */
.vim-overlay{

  width:100%;

<script>

/* =========================
   CINEMATIC BOOT SEQUENCE
   ========================= */

const bootScreen=document.getElementById('bootScreen')
const bootText=document.getElementById('bootText')
const desktop=document.getElementById('desktop')
const flicker=document.getElementById('bootFlicker')

function wait(ms){return new Promise(r=>setTimeout(r,ms))}

function randomFlicker(){
flicker.style.opacity=Math.random()*0.35
setTimeout(()=>flicker.style.opacity=0,60+Math.random()*120)
}

async function bootOS(){
for(let i=0;i<6;i++){randomFlicker();await wait(120+Math.random()*180)}
await wait(400)
bootText.textContent='loading kernel modules...'
await wait(900)
bootText.textContent='mounting filesystem...'
await wait(900)
bootText.textContent='establishing observer interface...'
await wait(900)
bootScreen.classList.add('hidden')
desktop.style.visibility='visible'
}

bootOS()

/* ===== CLOCK ===== */
const clockEl=document.getElementById('clock')
function iso(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0')}
setInterval(()=>clockEl.textContent=iso(),1000)

/* ===== WINDOW DRAG ===== */
const menuBar=document.querySelector('.menu-bar')
const terminalWindow=document.getElementById('terminalWindow')
const fileManagerWindow=document.getElementById('fileManagerWindow')
const textEditorWindow=document.getElementById('textEditorWindow')
const editor=document.getElementById('editor')
const editorTitle=document.getElementById('editorTitle')
const notepadIcon=document.getElementById('notepadIcon')

function closeTerminalWindow(){
terminalWindow.classList.add('hidden')
terminal.innerHTML=''
observerBooted=false
}

document.querySelectorAll('[data-close]').forEach(b=>{
const id=b.dataset.close
if(id==='terminalWindow') b.onclick=closeTerminalWindow
else b.onclick=()=>document.getElementById(id).classList.add('hidden')
})

function drag(win){
  const header=win.querySelector('[data-drag]')
  let dragging=false,offsetX=0,offsetY=0
  header.addEventListener('mousedown',e=>{
    dragging=true
    const rect=win.getBoundingClientRect()
    win.style.transform='none'
    win.style.left=rect.left+'px'
    win.style.top=rect.top+'px'
    offsetX=e.clientX-rect.left
    offsetY=e.clientY-rect.top
    document.body.style.userSelect='none'
  })
  document.addEventListener('mousemove',e=>{
    if(!dragging)return
    let x=e.clientX-offsetX
    let y=e.clientY-offsetY
    x=Math.max(0,Math.min(x,window.innerWidth-win.offsetWidth))
    y=Math.max(menuBar.offsetHeight,Math.min(y,window.innerHeight-win.offsetHeight))
    win.style.left=x+'px'
    win.style.top=y+'px'
  })
  document.addEventListener('mouseup',()=>{dragging=false;document.body.style.userSelect=''})
}

drag(terminalWindow)
drag(fileManagerWindow)
drag(textEditorWindow)

`RESEARCH: TRADING
================================================================================

Status:   Active
Markets:  Futures (index, gold, forex, oil)
Platform: TopstepX

Approach:
  The market is a probability engine, not a prediction machine.
  My edge comes from reading volatility across multiple timeframes
  to determine current market direction and position accordingly.

Indicator:
  Bollinger Bands only. No indicator stack.
  BB 56, 156, 240, 520, 1440 all at 1.25 deviation.
  These settings read overextension, compression, and mean reversion
  zones across short and medium-term timeframes.

Timeframes:
  Execution chart:     5-minute
  Confluence:          15-min, 1H, 4H
  Higher timeframe is context. Lower timeframe is entry.
  The higher timeframe is always right.

Setups I trade:

  Opening Range Breakout (ORB)
    US session open, high volatility, directional bias established.
    5-min candle closes above/below range with volume.
    BB expansion confirms. Target 2R, scale at 1.5R.
    Max 60-90 minutes in trade.

  Reversal at Key Level
    Price approaching daily support/resistance or round number.
    BB overextension with wick rejection or engulfing candle.
    Price pierces band and snaps back inside.
    Target 1.5-2R depending on confirmation.

  Pullback Continuation
    Strong trend on 30-min or 1H established.
    Pullback to middle BB band (mean reversion).
    Hammer or engulfing at midline. Trail after 1R.
    Minimum 2R target.

  Range Scalping
    Choppy session, BB contraction, defined range visible.
    Touch and wick rejection at upper or lower band.
    Only trade edges, never the middle.
    5-20 minutes in trade.

Risk rules:
  Max 2 losses per session. No exceptions.
  Once daily target hit, lock live account.
  Switch to practice account for reps without emotional cost.
  No forced recovery trades after red sessions.

What I'm still working on:
  Taking losses when proven wrong instead of holding.
  Trusting the stop over the hope.
  Detaching from individual outcomes and trusting the process.
  The hardest part of trading is psychological, not technical.

Journal note (July 2025):
  Need to be more willing to take a loss when proven wrong.
  Set alerts where I should have put stop losses.
  Something to keep mapping in mental game notes.
`,

================================================================================

Status:   Active
Lens:     Systems thinking, ecological cost, cultural critique

The core problem:
  A system built on infinite growth running on a finite planet.
  It does not account for what it destroys in the process of producing.
  Ecosystems, communities, attention, time.
  None of these appear on a balance sheet until they are gone.

How it works on people:
  Consumerism sells identity.
  You are what you buy. You are what you stream. You are your devices.
  The product is always secondary to the feeling of belonging it promises.
  That feeling is manufactured and deliberately temporary.
  Next quarter needs a new product.

The MTG pattern:
  Magic: The Gathering is a clean case study.
  A game built on community became a product line built on extraction.
  The community that built its value got priced out of it.
  This is not unique to MTG. It is the pattern.
  Sneakers. Video games. Music. Streaming. Social media.
  Every subculture eventually becomes a market segment.

On social media specifically:
  The platform is free because you are the product.
  Attention harvested and sold. Behavior profiled and monetized.
  Designed to maximize time on platform regardless of whether
  that time is good for you.
  Most people know this and use it anyway. Myself included, selectively.

What I think about it:
  I am not outside the system. Nobody is.
  But awareness of the mechanism changes your relationship to it.
  You can participate on your own terms if you are deliberate about it.
  Opting out entirely is not realistic. Being intentional is.

  "documents/research/digital_privacy.txt":
`RESEARCH: DIGITAL PRIVACY
================================================================================

Status:   Active
Philosophy: You own your data or someone else does. There is no middle.

The reality most people ignore:
  Every free service is monetizing something.
  Usually it is your behavior, your location, your connections,
  your purchases, your political views, your health concerns.
  This data is sold, aggregated, and used to influence you.
  It does not stay with the company you gave it to.

What most people actually give away without thinking:
  Search queries         (Google knows what you fear, want, feel)
  Location history       (everywhere you go, timestamped)
  Purchase history       (what you buy and when)
  Communication metadata (who you talk to and how often)
  Browsing behavior      (every site, every scroll, every pause)

The tools I use:
  Pihole          network-level ad and tracker blocking
                  blocks requests before they leave your network
  Vaultwarden     self-hosted password manager
                  your passwords on your machine, not a company's server
  SearXNG         self-hosted metasearch
                  queries routed privately, not tied to your identity
  LibreWolf       hardened Firefox fork
                  fingerprinting resistance, sensible defaults
  OpenVPN         self-hosted VPN
                  traffic routed through infrastructure I control
  uBlock Origin   browser-level blocking as a second layer

On VPNs:
  A commercial VPN does not make you private.
  It moves trust from your ISP to the VPN company.
  Self-hosted is the only version that actually removes a middleman.

On the argument "I have nothing to hide":
  Privacy is not about hiding.
  It is about who has power over information about you.
  Data collected today will be used in contexts that do not exist yet.
  You cannot predict what future you will need to protect.

Practical starting point for anyone:
  uBlock Origin in your browser. Do it today.
  Stop using Google search. Use SearXNG or Brave Search.
  Get a password manager. Stop reusing passwords.
  These three things alone meaningfully reduce your exposure.
`,

  "documents/research/minimalism.txt":
`RESEARCH: PHYSICAL MINIMALISM
================================================================================

Status:   Lived, not studied

What I actually own:
  One 26 liter bag.
  Everything fits: laptop, all clothes, all toiletries, all essentials.
  That is it. One bag, carry-on size, no checked luggage ever.
  A tatami mat and futon instead of a bed frame and mattress.

Why:
  Freedom of movement without logistics.
  I can leave anywhere without checked bags, without moving trucks,
  without the inertia that possessions create.
  Checked bags mean waiting, risk of loss, cost, dependency.
  One carry-on means I can go anywhere on any notice.

  If clothes need washing I wash them in the sink.
  It is not a sacrifice. It is just not a problem worth
  carrying extra luggage to solve.

On attachment to things:
  I understand the utility of objects.
  I am not anti-ownership on principle.
  I just do not want to be owned by what I own.
  Most things people accumulate do not get used.
  They get stored, maintained, moved, and eventually thrown away.
  The cost is not just money. It is attention and space.

The tatami:
  Sleeping closer to the floor changes your relationship to a room.
  Less furniture means less visual noise.
  The Japanese approach to living space has always made sense to me.
  Less in a room makes the room feel larger and calmer.

What this connects to:
  Digital minimalism is the same principle applied to attention.
  Physical minimalism applied to space and objects.
  The thread is the same: own what serves you.
  Do not let the rest accumulate.

What I notice in other people:
  A lot of what people own is identity management.
  The car, the apartment, the wardrobe.
  Signals sent outward about who you want to be perceived as.
  I find I care less about that the older I get.
`,

  "documents/blog/why_i_created_this_blog.txt":
`Why I Created This Blog
================================================================================
Date:  2024
Tags:  meta, internet, social media, personal

You may be wondering, "Orion, why did you create a blog? Social media exists,
who makes a blog in 2024?" You're probably right; this is something most people
won't do anymore when there are platforms like Twitter, Facebook, Reddit, and
whatever else.

The reason why I created this blog is that I wanted a more personal space for
myself to write my thoughts and put them out into the universe. On this website,
I have complete artistic freedom to do anything I want, without the
platform-imposed limitations, such as the 240-character limit on Twitter. That
limitation can really make it challenging to share more complex ideas.

Then there's Facebook and Instagram, both of which are algorithm-driven. Those
algorithms determine what content you see every day. Because of that, a lot of
content may or may not end up reaching its intended audience.

There was once a time when the internet wasn't so dominated by social media. I
hardly remember it, as I was born in 1996. I started using the internet when I
was around 5 years old, but I definitely remember the joy of going to random
websites to see what people made. It felt like there was more to explore then.
Now, it feels like most internet traffic is going to social media websites.

Whenever I'm in public, I often find myself observing what people do on their
phones. Typically, it's social media usage individuals posting life highlights
to portray an enhanced version of their reality. Essentially, individuals curate
what they wish to present, meticulously shaping an online identity that might
not accurately reflect their true selves.

Overall, I feel social media is mostly a distraction designed to keep you on
there as long as possible and monitor everything you do to ultimately serve
targeted advertisements. When a service is offered at no cost, often, you become
the commodity. This is particularly true for social media platforms, which are
notorious for collecting extensive amounts of user data.

I don't agree with it, yet I still use certain platforms in order to stay
connected with people I consider important to me. In response to that, I go out
of my way to block as many of these advertisements and trackers as possible.

In creating this blog, I'm stepping back to a more introspective approach one
that allows for deeper thought and more meaningful connections, away from the
relentless pace of social media. It's an attempt to recapture the essence of the
early internet: a place for discovery, genuine expression, and community
building, untainted by the commercial and algorithmic influences that dominate
our digital spaces today.

Thank you for being here, for reading, and for being a part of this.
Let's see where this path leads us.
`,

  "documents/blog/dark_side_of_instant_communication.txt":
`The Dark Side of Instant Communication
================================================================================
Date:  2024
Tags:  communication, mental health, mindfulness, technology

Since the creation of mobile phones, we've entered a new era of being able to
communicate with anyone around the world instantaneously. This has provided a
multitude of benefits for those who can take advantage of it. Imagine if we were
still reliant on paper mail as our primary form of communication?

Clearly, the technology behind instant communication has earned its place in our
world, offering a high level of convenience quickly sharing ideas with
colleagues, staying connected to friends and family, facilitating emergency
communications. However, while instant communication offers all these benefits,
it's crucial to acknowledge that it can also have detrimental effects on our
mental and emotional health.

One important aspect we must remember is the value of time the most precious
commodity we have. Instant messaging can create a false sense of urgency, making
us feel pressured to respond to messages as they arrive. Constantly responding
to messages drains not only our time but also our energy.

The concept we're exploring is quality over quantity. Taking time to craft
thoughtful replies rather than firing off rapid responses allows us to create
more meaningful interactions and avoid "attention residue" a state where our
minds are preoccupied with the possibility of receiving new messages, even when
we're not actively using our devices.

This phenomenon occurs because receiving a notification triggers a small burst
of dopamine in our brains, a chemical that makes us feel good, leading us to
check our phones repeatedly even in the absence of new messages. Over time, this
constant checking leads to attention residue: we feel anxious or distracted when
we're not using our devices.

To combat these issues, I propose prioritizing communications based on their
importance. If a message demands immediate attention, address it. Less urgent
communications can wait for a dedicated time slot in your day. This reduces the
stress of feeling constantly tethered to our devices and frees up time for other
important activities.

Additionally, learning to respect others' personal time and boundaries is
crucial. Setting clear boundaries for your availability helps manage expectations
and allows for thoughtful and thorough responses. Ideally, this practice creates
a ripple effect, encouraging friends, family, and colleagues to adopt a similar
approach.

Ultimately, prioritizing mindfulness and presence over digital distractions
enriches our lives, enabling us to cultivate deeper connections and live more
fully in the moment. Through mindful approaches to digital communication, we can
mitigate its drawbacks and harness its potential for a positive impact on our
lives.
`,

  "documents/blog/digital_minimalism.txt":
`Digital Minimalism
================================================================================
Date:  2024
Tags:  minimalism, technology, focus, productivity, habits

Digital minimalism is a philosophy I embrace that focuses on using technology
only when it adds value to my life, thereby minimizing distractions. While I
acknowledge the importance and inevitability of technological advancement, I
believe it's crucial to evaluate each digital tool's contribution to our goals
and values.

I have struggled with this for a very long time. Often, I find myself taking
breaks from digital services not because I reject technology, but because I
believe technology should serve the purpose of helping us achieve our goals.
Whether it's personal development, advancing in our careers, or improving
health, selecting the right digital tools is key.

In my case, I've struggled with consistently engaging in tasks that seem
automatic for others. To address this, I rely on a habit-tracking app. It
assists me in keeping track of everything I need to do, how often it needs to
be done, and I check it throughout my day. While I may not always meet these
goals, the app allows me to track everything and identify areas where I need to
improve.

One common pitfall in our digital age is the allure of all-in-one devices -
smartphones, tablets, and laptops that promise convenience by integrating
multiple functions into a single device. At first glance, these seem very
useful. Take a closer look and you'll see that all of the social and
entertainment apps, productivity tools they become the source of distractions.
So many things competing for our attention, disrupting our focus.

When it comes to productivity, simplicity and focus is what we need. When you
have a dedicated device for specific tasks, you minimize distractions and allow
yourself to concentrate. An e-reader eliminates the temptation of notifications
from other applications. Such devices allow you to fully immerse yourself in
whatever task is at hand.

Working digital minimalism into your life is meant to be a slow transition. It's
not something you do abruptly. Start by identifying the most important things to
you and explore what dedicated devices most fit that need.

I encourage you to regularly review and assess the digital tools and platforms
you use. Determine whether they contribute positively to your life. If not,
there are various ways to eliminate unnecessary digital noise: disabling
notifications, unsubscribing from irrelevant emails, or deleting unnecessary
apps. From there, establish rules for engaging with technology moving forward.
Designate specific times for checking emails and social media, and be mindful
of the content you consume.
`,

  "documents/blog/loneliness.txt":
`Loneliness
================================================================================
Date:  2024
Tags:  personal, mental health, loneliness, reflection, growth

I don't really remember when it hit me. It wasn't loud at first it was more
like background noise that became louder over time. I'd give anything for that
silence to go away.

I would spend days reflecting to myself trying to convince myself that life
comes in waves, has its highs and lows. In order for those happy days to really
mean something you need to move through unhappy times too. After all, without
unhappiness, how could we ever truly understand happiness?

There's a big difference between understanding and living through something.
After a while it starts to feel like something that isn't temporary like a storm
and just starts to feel like the normal weather. Just the way things are. I
often wonder: do the happy days ever return, or am I just telling myself that
to get through the day.

As I go through the motions of my daily life I continually try my best to find
the next distraction, but eventually they run out and the emotions will have to
be faced head on. It feels less like living and more like simply existing.
It's such a hollow feeling.

I remember spending an entire weekend once without plans, no one texting to
check in. I thought about reaching out to someone, but it felt so exhausting.
I didn't even have the energy to be perceived by another person. I wasn't sad,
but numb.

I've thought about how I ended up like this, and if I'm being honest I have no
fucking idea when I lost touch with everything. It was probably a gradual shift
as I was just trying my very best to make it through the day, ticking off the
checkboxes for whatever needed to be done. I had forgotten what it was like to
really want to do things, to be passionate about something.

Somewhere in the midst of all the numbness, I had a moment of clarity. I had
forgotten who I am and I was desperate to remember. That moment didn't feel
like an epiphany it wasn't an overwhelming flood of emotions, but rather
something quietly shifted inside of me. There was a small ember lighting the
dark numbness. I didn't know what to do with it then, but I knew I had to do
something.

I wasn't looking for some grand act of change. Those are never the solution.
Rather, I wanted to reconnect with my inner child. Who was I before the world
told me who I needed to be?

So, I started simple. I picked up things I used to enjoy. I started playing my
ukulele and singing. I started skateboarding. To be honest, I wasn't enjoying
them at first. It felt very forced. My fingers felt stiff trying to play each
note. Skateboarding felt awkward as my body had forgotten the rhythm it once
moved with. I don't know why, but I persisted. The music doesn't sound great,
nor do I glide as smoothly on the skateboard as before but that's okay.
Everything slowly got more natural as time went on. I felt myself reconnecting
with a part that I once thought was lost forever. It's not about trying to be
the person I used to be. I am simply letting myself be.

It's a slow process, and I am still in the middle of it. But the energy has
shifted. The silence hasn't completely gone, but most days, it's no longer
overwhelming.

There's a line from a Tyler, The Creator song that's been stuck in my head:

  "They say the loudest in the room is weak
   That's what they assume, but I disagree
   I say the loudest in the room
   Is prolly the loneliest one in the room"

I used to be the kind of person that was afraid to talk to strangers, terrified
of saying the wrong thing or being perceived as awkward. But lately, I've been
forcing myself to speak anyway, even if the outcome is uncomfortable or even
disappointing. Because as painful as it is to stumble socially, I've realized
it hurts so much more to sit in silence wondering what could've happened if I
had just said something.
`,

let currentDoc="note.txt"

function openTextEditor(name="note.txt"){
  if(!(name in documents)) documents[name]=""
  currentDoc=name
  editor.value=documents[name]
  editor.readOnly=false
  editor.style.opacity='1'
  editor.style.cursor='text'
  editorTitle.textContent=name+' text editor'
  textEditorWindow.classList.remove('hidden')
  editor.focus()
}

function openReadOnlyEditor(path){
  const content=documents[path]
  if(content===undefined){return}
  editor.value=content
  editor.readOnly=true
  editor.style.opacity='0.8'
  editor.style.cursor='default'
  editorTitle.textContent=path+'  [read-only]'
  textEditorWindow.classList.remove('hidden')
}

editor.addEventListener('input',()=>{
  if(!editor.readOnly) documents[currentDoc]=editor.value
})

notepadIcon.ondblclick=()=>openTextEditor('note.txt')

let guiPath=[FS],shellPath=[FS]
const cwd=p=>p[p.length-1]
const pathStr=p=>'/'+p.slice(1).map(f=>f.name).join('/')

/* ===== FILE MANAGER ===== */
const fileManagerIcon=document.getElementById('fileManagerIcon')
const fileGrid=document.getElementById('fileGrid')
const pathBar=document.getElementById('pathBar')
const backBtn=document.getElementById('backBtn')

fileManagerIcon.ondblclick=()=>{fileManagerWindow.classList.remove('hidden');renderFolder()}

backBtn.onclick=()=>{
  if(guiPath.length>1){guiPath.pop();renderFolder()}
}

function renderFolder(){
  const f=cwd(guiPath)
  fileGrid.innerHTML=''
  pathBar.textContent=pathStr(guiPath)||'/'

  // Render subfolders
  f.folders.filter(x=>!x.hidden).forEach(x=>{
    const el=document.createElement('div')
    el.className='file-item'
    el.innerHTML='<div style="font-size:32px">📁</div><span>'+x.name+'</span>'
    el.ondblclick=()=>{
      if(x.restricted)return
      guiPath.push(x)
      renderFolder()
    }
    fileGrid.appendChild(el)
  })

  // Render files
  ;(f.files||[]).forEach(x=>{
    const el=document.createElement('div')
    el.className='file-item'
    el.innerHTML='<div style="font-size:32px">📄</div><span>'+x.name+'</span>'
    el.ondblclick=()=>{
      const fullPath=guiPath.slice(1).map(n=>n.name).concat(x.name).join('/')
      openReadOnlyEditor(fullPath)
    }
    fileGrid.appendChild(el)
  })
}

/* ===== HELPER ===== */
function escapeHtml(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
}

/* ============================================================
   ORIGINAL PSYCHOLOGICAL TERMINAL ENGINE
   ============================================================ */

const terminal=document.getElementById('terminal')
const artifactOverlay=document.getElementById('artifactOverlay')
const memory=[]
const sessionStart=Date.now()
let lastKeyTime=Date.now()
let typingIntervals=[]

const SYSTEM_NODE='orionv.io'

let backspaceCount=0
let commandCount=0
let hesitationEvents=0
let psychScore=0
let emotionalState='baseline'
let narrativeStage=0

const PUBLIC_PROFILE=[
'identity and aliases: Orion, Onion, Ledger',
'',
'orientation:',
'  perception depends on angle of approach',
'  interpretation depends on distance maintained',
'',
'behavioral structure:',
'  multi-layered presentation model',
'  adaptive surface expression',
'  internal states not externally indexed',
'',
'observation note:',
'  interaction determines which layer becomes visible',

'  removal of one layer guarantees the existence of another',
'',
'warning:',
'  whichever version is encountered is not accidental',
'  it is contextually deserved'
]

const TRUE_PROFILE_PLACEHOLDER=[
'identity continuity cannot be externally confirmed.',
'layers are not disguises they are simultaneous states.',
'the observer selects what becomes real by interacting with it.',
'perception is participation.',
'',
'there is no single center.',
'there are only depths that appear central from where you stand.',
'',

'you are activating them.'
]

const identityFragments=[
'layered identity architecture detected.',
'presentation model dynamically responsive to observer behavior.',
'surface variance not correlated with internal instability.',
'adaptive mirroring protocol active.',
'observer influence exceeds baseline expectations.',
'predictive model indicates interaction-dependent personality expression.'
]

let profileConfidence=42
let trueProfileUnlocked=false

function printLine(text,cls='output'){const line=document.createElement('div');line.className=cls;line.textContent=text;terminal.appendChild(line);terminal.scrollTop=terminal.scrollHeight;return line}
function glitchLine(el,duration=900){el.classList.add('glitch');setTimeout(()=>el.classList.remove('glitch'),duration)}
function whisper(text){const l=printLine(text);l.classList.add('fade');glitchLine(l,600)}
function revealArtifact(duration=2600){artifactOverlay.classList.add('visible');setTimeout(()=>artifactOverlay.classList.remove('visible'),duration)}

function inferEmotionalState(){const avg=typingIntervals.length?typingIntervals.reduce((a,b)=>a+b,0)/typingIntervals.length:0;if(backspaceCount>15&&hesitationEvents>3)emotionalState='self-editing';else if(avg>1000)emotionalState='deliberative';else emotionalState='baseline'}

function updateNarrativeStage(){const elapsed=Date.now()-sessionStart;if(elapsed>20000)narrativeStage=Math.max(narrativeStage,1);if(psychScore>25)narrativeStage=Math.max(narrativeStage,2);if(commandCount>10)narrativeStage=Math.max(narrativeStage,3);if(trueProfileUnlocked)narrativeStage=Math.max(narrativeStage,4)}

function updatePsychScore(){psychScore=Math.min(100,Math.floor((typingIntervals.length*3)+(backspaceCount*1.4)+(hesitationEvents*4)+(commandCount*2)));profileConfidence=Math.min(99,35+Math.floor(psychScore*.6))}

setInterval(()=>{const elapsed=Date.now()-sessionStart;if(Math.random()<.45)whisper(`${SYSTEM_NODE} session duration: ${Math.floor(elapsed/1000)}s`);if(elapsed>120000&&!trueProfileUnlocked){trueProfileUnlocked=true;const l=printLine(`${SYSTEM_NODE} deeper identity layer available.`);glitchLine(l,1600);revealArtifact(3200)}updateNarrativeStage()},18000)

function randomPresence(){if(narrativeStage===0)whisper(`${SYSTEM_NODE} monitoring interaction.`);else if(narrativeStage===1)whisper(`${SYSTEM_NODE} interaction signature forming.`);else if(narrativeStage===2)whisper(`${SYSTEM_NODE} behavior classification: ${emotionalState}`);else if(narrativeStage===3)whisper(`${SYSTEM_NODE} predictive model stabilizing.`);else whisper(`${SYSTEM_NODE} model confidence approaching threshold.`)}

function printPrompt(){
  const wrapper=document.createElement('div')
  wrapper.className='line'
  const prompt=document.createElement('span')
  prompt.className='prompt'
  prompt.textContent='observer@orionv.io:'+(pathStr(shellPath)||'/')+'$ '
  const input=document.createElement('input')
  wrapper.appendChild(prompt)
  wrapper.appendChild(input)
  terminal.appendChild(wrapper)
  terminal.scrollTop=terminal.scrollHeight
  input.focus()
  input.addEventListener('keydown',e=>{
    const now=Date.now()
    const interval=now-lastKeyTime
    lastKeyTime=now
    typingIntervals.push(interval)
    if(interval>1400)hesitationEvents++
    if(e.key==='Backspace')backspaceCount++
    if(e.key==='Enter'){
      const value=input.value.trim()
      input.disabled=true
      memory.push(value)
      commandCount++
      inferEmotionalState()
      updatePsychScore()
      updateNarrativeStage()
      dispatchCommand(value)
    }
  })
}

function dispatchCommand(cmd){
  const lower=cmd.toLowerCase()
  const privileged=lower.startsWith('sudo ')
  const c=privileged?lower.replace(/^sudo\s+/,''):lower

  // ===== FILESYSTEM NAVIGATION =====
  if(c==='pwd'){printLine(pathStr(shellPath)||'/');return printPrompt()}

  if(c==='ls'||c==='ls -a'){
    const all=c==='ls -a'
    const curr=cwd(shellPath)
    curr.folders.filter(f=>all||!f.hidden).forEach(f=>printLine(f.name+'/'))
    ;(curr.files||[]).forEach(f=>printLine(f.name))
    return printPrompt()
  }

  if(c.startsWith('cd ')){
    const t=c.slice(3).trim()
    if(t==='..'||t==='../'){if(shellPath.length>1)shellPath.pop()}
    else if(t==='/'||t==='root'){shellPath=[FS]}
    else{const f=cwd(shellPath).folders.find(x=>x.name===t);if(!f)printLine('cd: no such directory: '+t);else if(f.restricted&&!privileged)printLine('permission denied');else shellPath.push(f)}
    return printPrompt()
  }

  // ===== VIM =====
  if(c.startsWith('vim ')){
    const target=cmd.slice(4).trim()
    // Build lookup key: strip leading slash
    const key=target.replace(/^\//,'')
    const content=documents[key]
    if(content===undefined){
      printLine('vim: '+target+': No such file or directory')
      return printPrompt()
    }
    const lines=content.split('\n')
    const vimOverlay=document.createElement('div')
    vimOverlay.className='vim-overlay'
    const numbered=lines.map((l,i)=>{
      const num=String(i+1).padStart(3,' ')
      return `<span class="vim-num">${num}  </span>${escapeHtml(l)}`
    }).join('\n')
    vimOverlay.innerHTML=`
      <div class="vim-body">${numbered}</div>
      <div class="vim-statusbar">
        <span>${escapeHtml(target)}</span>
        <span>${lines.length}L  [readonly]</span>
        <span>:q  exit</span>
      </div>
      <div class="vim-cmdline" id="vimCmd"></div>`
    terminal.appendChild(vimOverlay)
    terminal.scrollTop=terminal.scrollHeight
    let vimInput=''
    const vimKey=e=>{
      e.preventDefault()
      if(e.key===':'){vimInput=':'}
      else if(e.key==='q'&&vimInput===':'){vimInput=':q'}
      else if(e.key==='Enter'&&vimInput===':q'){
        document.removeEventListener('keydown',vimKey)
        vimOverlay.remove()
        return printPrompt()
      } else if(e.key==='Escape'){vimInput=''}
      const cmdLine=document.getElementById('vimCmd')
      if(cmdLine)cmdLine.textContent=vimInput
    }
    document.addEventListener('keydown',vimKey)
    return
  }

  // ===== CAT =====
  if(c.startsWith('cat ')){
    const name=c.replace('cat ','').trim()
    const key=name.replace(/^\//,'')
    printLine(documents[key]!==undefined?documents[key]:'cat: '+name+': No such file')
    return printPrompt()
  }

  // ===== TEXT EDITOR =====
  if(c.startsWith('edit ')){
    const name=c.replace('edit ','').trim()||'note.txt'
    openTextEditor(name)
    printLine(`${SYSTEM_NODE} editor opened for ${name}`)
    return printPrompt()
  }

  if(c==='note'){
    openTextEditor('note.txt')
    printLine(`${SYSTEM_NODE} editor opened.`)
    return printPrompt()
  }

  // ===== ARTIFACT =====
  if(c==='artifact'||c==='reveal'||c==='signal'){
    if(!privileged){printLine(`${SYSTEM_NODE} access denied.`);whisper(`${SYSTEM_NODE} elevated execution context required.`);return printPrompt()}
    const l=printLine(`${SYSTEM_NODE} artifact exposure authorized.`)
    glitchLine(l,2000)
    setTimeout(()=>revealArtifact(4500),400)
    return printPrompt()
  }

  // ===== OBSERVER ENGINE =====
  observerHandleCommand(cmd)
}

function observerHandleCommand(cmd){
  const lower=cmd.toLowerCase()
  if(Math.random()<.35)randomPresence()

  if(lower==='help'){
    printLine(`${SYSTEM_NODE} available queries:`)
    ;['whoami','observe','think','listen','status','clear','reboot','exit',
      'ls','cd <dir>','pwd','cat <file>','vim <file>','edit <file>'].forEach(c=>printLine('  '+c))
  }
  else if(lower==='whoami'){printLine(`${SYSTEM_NODE} identity fragments detected.`);PUBLIC_PROFILE.forEach(line=>printLine(line));identityFragments.forEach(f=>printLine(f));printLine(`profile confidence: ${profileConfidence}%`);printLine(`emotional classification: ${emotionalState}`);if(trueProfileUnlocked){printLine(`${SYSTEM_NODE} decrypting deeper layer...`);TRUE_PROFILE_PLACEHOLDER.forEach(line=>printLine(line))}whisper(`${SYSTEM_NODE} identity remains probabilistic.`)}
  else if(lower==='observe'){printLine(narrativeStage<2?`${SYSTEM_NODE} observation registered.`:`${SYSTEM_NODE} observer and observed distinction degrading.`)}
  else if(lower==='think'){printLine(narrativeStage<2?`${SYSTEM_NODE} thought registered.`:`${SYSTEM_NODE} recursive cognition detected.`)}
  else if(lower==='listen'){printLine(`${SYSTEM_NODE} background signal present.`)}
  else if(lower==='status'){printLine(`${SYSTEM_NODE} behavioral model active.`);printLine(`psychological resolution: ${psychScore}/100`);printLine(`profile confidence: ${profileConfidence}%`);printLine(`narrative stage: ${narrativeStage}`);printLine(`emotional state: ${emotionalState}`)}
  else if(lower==='exit'){closeTerminalWindow();return}
  else if(lower==='clear'){terminal.innerHTML='';return printPrompt()}
  else if(lower==='reboot'){terminal.innerHTML='';bootObserver();return}
  else{printLine(`${SYSTEM_NODE} input received.`)}

  printPrompt()
}

function typeText(text,delay=24){return new Promise(resolve=>{const line=document.createElement('div');line.className='output';terminal.appendChild(line);let i=0;function tick(){line.textContent+=text[i];i++;terminal.scrollTop=terminal.scrollHeight;if(i<text.length)setTimeout(tick,delay);else resolve(line)}tick()})}

async function bootObserver(){
  await typeText(`initializing ${SYSTEM_NODE} perceptual layer...`)
  await typeText(`${SYSTEM_NODE} interface reactive.`)
  await typeText('type "help" if structure is needed.')
  printPrompt()
  spontaneousActivity()
}

function spontaneousActivity(){setInterval(()=>{if(Math.random()<.25)randomPresence();if(Math.random()<.18&&memory.length){const echo=memory[Math.floor(Math.random()*memory.length)];whisper(`${SYSTEM_NODE} echo: `+echo)}},4000+Math.random()*3000)}

let observerBooted=false
const terminalIcon=document.getElementById('terminalIcon')
terminalIcon.ondblclick=()=>{
  if(!observerBooted){
    terminalWindow.classList.remove('hidden')
    bootObserver()
    observerBooted=true
  } else {
    terminalWindow.classList.remove('hidden')
  }
}
